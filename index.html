<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ai-star-dev</title>
  <link rel="icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1e;
      --surface: #16162a;
      --border: #2a2a45;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #facc15;
      --blue: #3b82f6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 3rem;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
    }

    .star-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    h1 .dim   { color: var(--muted); }
    h1 .star  { color: var(--accent); }
    h1 .slash { color: var(--border); margin: 0 2px; }

    .tagline {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── Projects ── */
    .projects { width: 100%; max-width: 480px; }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.18s, background 0.18s;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--blue);
      background: #1a1a35;
    }

    .card-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: #1e2a4a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-body .name {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .card-body .desc {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .card-arrow {
      margin-left: auto;
      color: var(--border);
      transition: color 0.18s, transform 0.18s;
    }

    .card:hover .card-arrow { color: var(--blue); transform: translateX(3px); }

    /* ── Footer ── */
    footer {
      font-size: 0.75rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="hero">
    <div class="star-icon">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <polygon points="20,3 24.9,14.6 37.6,15.1 28,23.2 31.1,35.6 20,28.8 8.9,35.6 12,23.2 2.4,15.1 15.1,14.6"
          fill="#facc15" />
      </svg>
    </div>
    <h1>
      <span class="dim">ai</span><span class="slash">-</span><span class="star">star</span><span class="slash">-</span><span class="dim">dev</span>
    </h1>
    <p class="tagline">Open source tools &amp; experiments</p>
  </div>

  <div class="projects">
    <p class="section-label">Projects</p>
    <a class="card" href="https://ai-star-dev.github.io/web-screen-recoder" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <circle cx="10" cy="10" r="2" fill="#3b82f6" stroke="none"/>
          <path d="M10 10 l6 3 l-6 3 z" fill="#3b82f6" stroke="none"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="name">web-screen-recorder</div>
        <div class="desc">Record your screen directly in the browser</div>
      </div>
      <svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

    <a class="card" href="https://github.com/AI-Star-Dev/vaultkeeper-releases" target="_blank" rel="noopener" style="margin-top: 0.75rem;">
      <div class="card-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1" fill="#3b82f6" stroke="none"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="name">vault-keeper</div>
        <div class="desc">Secure local password &amp; secrets manager</div>
      </div>
      <svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

  <footer>
    <a href="https://github.com/ai-star-dev" target="_blank" rel="noopener">github.com/ai-star-dev</a>
  </footer>

</body>
</html>
